name: build-wasmegg
on:
  push:
    paths:
      - pnpm-lock.yaml
      - 'wasmegg/**'
      - 'ui/**'
      - 'lib/**'
      - 'periodicals/*'
      - 'periodicals/data/*'
      - '!periodicals/data/contracts.json'
      - '!periodicals/data/seasoncontracts.json'
      - 'protobuf/ei.proto'
  pull_request:
    types: [opened, edited, reopened]
    paths:
      - 'lib/**'
      - 'ui/**'
      - 'wasmegg/**'
      - 'periodicals/*'
      - 'periodicals/data/*'
  workflow_dispatch:
  #schedule:
  # Regenerate every day to incorporate updated mission outcome data.
  # Cron moved to cloudflare worker for more reliable timing
  # - cron: '30 4 * * *'

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  # No TS type checking for faster deployment.
  wasmegg-fastbuild:
    runs-on: ubuntu-latest
    if: github.actor != 'dependabot[bot]' && github.event_name != 'pull_request'
    defaults:
      run:
        working-directory: wasmegg
    steps:
      - uses: actions/checkout@v6
      - name: Set up protoc
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends protobuf-compiler
          # Install protoc-gen-doc
          basename=protoc-gen-doc-1.4.1.linux-amd64.go1.15.2
          wget https://github.com/pseudomuto/protoc-gen-doc/releases/download/v1.4.1/$basename.tar.gz
          tar xf $basename.tar.gz
          echo "$PWD/$basename" >> $GITHUB_PATH
      - name: Set up ets
        run: |
          wget https://github.com/zmwangx/ets/releases/download/v0.2.1/ets_0.2.1_linux_amd64.deb
          sudo dpkg -i ets_0.2.1_linux_amd64.deb
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '^1.22'
      - name: Install pnpm
        uses: pnpm/action-setup@v5.0.0
      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: |
            pnpm-lock.yaml
            pnpm-global/5/pnpm-lock.yaml
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'
      - name: Do other preparations
        run: |
          ../action-scripts/prepare
      - name: Build lib
        working-directory: lib
        run: |
          make init
          make
      - name: Initialize dependencies
        run: |
          make init -j1
      - name: Build
        run: |
          make -j2 fastbuild
        env:
          EIAPI_TOKEN: ${{ secrets.EIAPI_TOKEN }}
      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: wasmegg/dist
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'

  deploy-ghpages:
    needs: wasmegg-fastbuild
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # With TS type checking.
  wasmegg-fullbuild:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: wasmegg
    steps:
      - uses: actions/checkout@v6
      - name: Set up protoc
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends protobuf-compiler
          # Install protoc-gen-doc
          basename=protoc-gen-doc-1.4.1.linux-amd64.go1.15.2
          wget https://github.com/pseudomuto/protoc-gen-doc/releases/download/v1.4.1/$basename.tar.gz
          tar xf $basename.tar.gz
          echo "$PWD/$basename" >> $GITHUB_PATH
      - name: Set up ets
        run: |
          wget https://github.com/zmwangx/ets/releases/download/v0.2.1/ets_0.2.1_linux_amd64.deb
          sudo dpkg -i ets_0.2.1_linux_amd64.deb
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '^1.22'
      - name: Install pnpm
        uses: pnpm/action-setup@v5.0.0
      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: |
            pnpm-lock.yaml
            pnpm-global/5/pnpm-lock.yaml
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'
      - name: Do other preparations
        run: |
          ../action-scripts/prepare
      - name: Build lib
        working-directory: lib
        run: |
          make init
          make
      - name: Initialize dependencies
        run: |
          make init -j1
      - name: Build
        run: |
          make -j2
        env:
          EIAPI_TOKEN: ${{ secrets.EIAPI_TOKEN }}
